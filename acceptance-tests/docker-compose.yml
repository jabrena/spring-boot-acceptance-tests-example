services:
  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    ports:
      - "8080"
      - "5005:5005"   # fixed host port for remote debugger (attach to localhost:5005)
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
